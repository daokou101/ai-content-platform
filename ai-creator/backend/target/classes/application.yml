server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_creator?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    virtual-host: /
    username: guest
    password: guest
    listener:
      simple:
        prefetch: 1
        concurrency: 2
        max-concurrency: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: AiCreatorPlatform2024SecretKeyForJWTTokenGeneration!@#$%
  expiration: 86400000

# AI 模型配置
ai:
  default-model: deepseek-chat
  models:
    - name: "DeepSeek"
      api-url: "https://api.deepseek.com/v1/chat/completions"
      model: "deepseek-chat"
    - name: "通义千问"
      api-url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
      model: "qwen-plus"
    - name: "智谱 GLM"
      api-url: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
      model: "glm-4-flash"
    - name: "硅基流动"
      api-url: "https://api.siliconflow.cn/v1/chat/completions"
      model: "Pro/Qwen/Qwen2.5-7B-Instruct"
    - name: "OpenAI"
      api-url: "https://api.openai.com/v1/chat/completions"
      model: "gpt-4o-mini"

# API 密钥和生成参数（所有模型共用）
deepseek:
  api-key: sk-your-api-key-here
  max-tokens: 4096
  temperature: 0.7

# 线程池
thread-pool:
  core-pool-size: 10
  max-pool-size: 20
  queue-capacity: 100
  keep-alive-seconds: 300
