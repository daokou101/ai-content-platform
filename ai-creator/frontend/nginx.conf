# =============================================
# Frontend Nginx 配置
#
# 功能说明：
#   1. 托管 Vue 构建后的静态文件
#   2. 将 /api 路径的请求反向代理到后端
#   3. 支持 SPA 路由（history 模式）
#   4. SSE 端点关闭缓冲（关键！）
#
# proxy_buffering off 为什么重要？
#   SSE（Server-Sent Events）是持续不断的流式响应，
#   Nginx 默认会缓冲响应数据，等攒够一定量才发送给客户端。
#   这会导致前端 EventSource 收不到实时数据，
#   要等 AI 全部生成完才一次性收到，失去"打字机效果"。
#   关闭缓冲后，Nginx 收到后端数据立即转发给客户端。
# =============================================

server {
    listen 80;
    server_name localhost;

    # 字符集
    charset utf-8;

    # 根目录：Vue 构建后的静态文件
    root /usr/share/nginx/html;
    index index.html;

    # =====================================
    # 1. API 反向代理
    # =====================================
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 连接超时
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;

        # SSE 端点（/api/ai/generate/sse）必须关闭缓冲
        # 否则 AI 生成的文本不会逐字推送，会攒在一起发
        proxy_buffering off;
        proxy_cache off;
    }

    # =====================================
    # 2. SPA 路由处理
    #
    # Vue 使用 history 模式时，刷新页面或直接访问子路径
    # （如 /generate、/contents）会 404，
    # 因为 Nginx 找不到对应的文件。
    # 这里把所有非文件路径都指向 index.html，
    # 让 Vue Router 接管路由。
    # =====================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
