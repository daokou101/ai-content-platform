# ============================================
# Spring Boot 应用配置文件
# ============================================
# 【新增：服务器核心配置】
server:
  address: 0.0.0.0   # 关键！允许所有设备访问（校园网/局域网）
  port: 8080         # 后端端口（固定8080）

# 下面是你原来的配置，不动！
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

file:
  upload-path: E:/uploads/